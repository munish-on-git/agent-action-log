[profile.default]
src = "src"
out = "out"
libs = ["lib"]
metadata = true
metadata_hash = "none"     # disable ipfs
use_literal_content = true  # embed source for verification

# Monad Testnet configuration
eth-rpc-url = "https://testnet-rpc.monad.xyz"
chain_id = 10143

# --- To switch to Monad Mainnet, replace the two lines above with: ---
# eth-rpc-url = "https://rpc.monad.xyz"
# chain_id = 143
